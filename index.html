<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="一款支持键盘与触屏操作的明亮暖色 2048 网页游戏。"
    />
    <meta name="theme-color" content="#fbf9f1" />
    <title>2048 · 数字合成游戏</title>
  </head>
  <body>
    <main class="game-shell" aria-label="2048 游戏">
      <header class="game-header">
        <div class="brand">
          <span class="eyebrow">数字合成游戏</span>
          <h1>2048</h1>
          <p>让相同数字相遇，一步一步抵达 2048。</p>
        </div>
        <div class="header-actions">
          <button class="restart-button restart-button--header" type="button" data-action="restart">
            新游戏
          </button>
        </div>
      </header>

      <section class="game-board-area">
        <div class="game-toolbar">
          <div class="stats-row">
            <section class="score-panel score-panel--current" aria-label="当前分数">
              <span>当前分数</span>
              <strong id="score">0</strong>
            </section>
            <section class="score-panel score-panel--best" aria-label="历史最佳">
              <span>历史最佳</span>
              <strong id="best-score">0</strong>
            </section>
          </div>
          <p class="desktop-hint"><kbd>↑</kbd><kbd>↓</kbd><kbd>←</kbd><kbd>→</kbd> 移动方块</p>
        </div>

        <section class="board-wrap" aria-live="polite">
          <section class="board" id="board" aria-label="4乘4游戏棋盘"></section>
          <div class="game-message" id="game-message" hidden>
            <strong id="game-message-title">游戏结束</strong>
            <button
              class="restart-button continue-button"
              id="continue-button"
              type="button"
              hidden
            >
              继续游戏
            </button>
            <button class="restart-button" type="button" data-action="restart">重新开始</button>
          </div>
        </section>

        <div class="game-guide" aria-label="游戏说明">
          <p><strong>怎么玩</strong> 使用方向键或滑动屏幕移动方块，相同数字相撞时会合并。</p>
          <span class="goal-chip">目标 · 2048</span>
        </div>
      </section>
    </main>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
